<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Hari Ini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Poppins:ital,wght@0,500;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-1: #5d96f4;
    --blue-2: #367ce9;
    --blue-deep: #304a91;
    --pink-1: #ff4d7c;
    --pink-2: #ff386f;
    --hot-pink: #f50098;
    --yellow: #ffe159;
    --red: #ef312d;
    --ink: #2B2B33;
    --white: #ffffff;
    --stage-w: 1920px;
    --stage-h: 1080px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: linear-gradient(160deg, var(--blue-1), var(--blue-2));
    color: var(--white);
    font-family: "Poppins", "Segoe UI", sans-serif;
    overflow: hidden;
  }
  .screen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: var(--stage-w);
    height: var(--stage-h);
    transform-origin: top left;
  }
  .screen.active { display: flex; }

  .display { font-family: "Baloo 2", "Poppins", sans-serif; }

  /* ---------- Layar pilih outlet ---------- */
  #setup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
    text-align: center;
    padding: 24px;
  }
  .logo-title { line-height: 1; }
  .logo-title .t1 {
    font-family: "Baloo 2", sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 6vw, 100px);
    color: var(--white);
    letter-spacing: .03em;
    text-shadow: none;
  }
  .logo-title .t2 {
    font-family: "Baloo 2", sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 5.65vw, 96px);
    color: var(--yellow);
    background: var(--red);
    padding: .02em .34em .06em;
    border-radius: .22em;
    box-shadow: 0 7px 0 rgba(24, 55, 122, .34);
    display: inline-block;
    transform: rotate(-1.8deg);
  }
  .setup-card {
    background: var(--white);
    color: var(--ink);
    border-radius: 26px;
    padding: 4vh 4vw;
    display: flex;
    flex-direction: column;
    gap: 2.4vh;
    align-items: center;
    box-shadow: 0 10px 0 rgba(29, 79, 184, .35);
    min-width: min(560px, 88vw);
  }
  .setup-card label { font-weight: 700; font-size: clamp(15px, 1.5vw, 22px); }
  #outletSelect {
    font-family: "Poppins", sans-serif;
    font-weight: 600;
    font-size: clamp(15px, 1.6vw, 22px);
    padding: 14px 20px;
    width: 100%;
    background: #F2F6FF;
    color: var(--ink);
    border: 3px solid var(--blue-2);
    border-radius: 14px;
  }
  #startBtn {
    font-family: "Baloo 2", sans-serif;
    font-weight: 800;
    font-size: clamp(17px, 1.8vw, 26px);
    padding: .55em 2.4em;
    background: linear-gradient(180deg, var(--pink-1), var(--pink-2));
    color: var(--white);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(150, 30, 60, .4);
    letter-spacing: .02em;
  }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(150, 30, 60, .4); }
  #startBtn:disabled { opacity: .45; cursor: default; }
  #setupStatus { color: #EAF1FF; font-weight: 600; font-size: clamp(12px, 1.2vw, 17px); min-height: 1.4em; }

  /* ---------- Layar signage ---------- */
  #board {
    flex-direction: column;
    padding: 44px 58px 38px;
    gap: 64px;
  }

  header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 19px;
    flex: 0 0 auto;
  }
  #board .logo-title .t1 { font-size: 100px; }
  #board .logo-title .t2 { font-size: 96px; }
  .head-pill {
    background: rgba(255, 255, 255, .92);
    color: var(--blue-deep);
    font-weight: 700;
    font-size: 17px;
    padding: .58em 1.35em;
    border-radius: 999px;
    box-shadow: 0 3px 0 rgba(31, 69, 145, .25), 0 0 0 2px rgba(31, 69, 145, .08) inset;
    white-space: nowrap;
    justify-self: start;
  }
  .head-pill.right { justify-self: end; }
  .head-center { text-align: center; }

  .panel {
    flex: 1 1 auto;
    position: relative;
    background: var(--pink-2);
    border: 5px solid var(--yellow);
    border-radius: 32px;
    box-shadow: 0 0 0 4px rgba(64, 206, 214, .52), 0 10px 20px rgba(31, 69, 145, .18);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .slides-area { position: relative; flex: 1 1 auto; }

  .slide {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 25px;
    padding: 48px 62px 54px;
    opacity: 0;
    transform: scale(.985);
    transition: opacity .7s ease, transform .7s ease;
    pointer-events: none;
  }
  .slide.visible { opacity: 1; transform: scale(1); }
  .slide.count-1 { grid-template-columns: minmax(0, 1fr); padding-left: 480px; padding-right: 480px; }
  .slide.count-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); padding-left: 250px; padding-right: 250px; }

  .card {
    background: var(--white);
    border: 0;
    border-radius: 86px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    gap: 0;
    padding: 46px 38px 36px;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }
  .brand-name {
    font-family: "Baloo 2", sans-serif;
    font-weight: 800;
    font-size: 58px;
    color: var(--blue-deep);
    letter-spacing: 0;
    line-height: .88;
    overflow-wrap: anywhere;
    text-transform: uppercase;
  }
  .discount-label {
    color: var(--blue-deep);
    font-weight: 500;
    font-size: 30px;
    line-height: 1;
    margin-top: 12px;
    text-transform: uppercase;
  }

  .value {
    font-family: "Poppins", "Segoe UI", sans-serif;
    font-weight: 800;
    line-height: .78;
  }
  .value.percent {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-top: 24px;
    margin-bottom: 40px;
    min-height: 278px;
    width: 100%;
    color: #000;
    letter-spacing: -0.05em;
  }
  .percent-number {
    font-size: 266px;
    line-height: .78;
  }
  .percent-dot {
    width: 120px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: var(--hot-pink);
    color: var(--white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0;
    margin-left: -34px;
    margin-bottom: 8px;
  }
  .value.text {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 278px;
    margin: 24px 0 40px;
    font-size: 42px;
    color: #000;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }

  .scope-pill {
    background: var(--pink-1);
    color: var(--white);
    font-weight: 800;
    font-size: 30px;
    letter-spacing: 0;
    line-height: 1;
    padding: .64em 1.9em .68em;
    border-radius: 999px;
    width: min(100%, 340px);
    white-space: nowrap;
  }
  .period {
    color: var(--pink-1);
    font-weight: 800;
    font-size: 23px;
    line-height: 1.1;
    margin-top: 20px;
    white-space: nowrap;
  }

  footer {
    display: none;
  }
  .dot {
    width: clamp(9px, .85vw, 15px);
    height: clamp(9px, .85vw, 15px);
    border-radius: 50%;
    background: rgba(255, 255, 255, .5);
    transition: background .3s, transform .3s;
  }
  .dot.on { background: var(--yellow); transform: scale(1.25); }

  #emptyState {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    text-align: center;
    padding: 24px;
    z-index: 2;
  }
  #emptyState .big {
    font-family: "Baloo 2", sans-serif;
    font-weight: 800;
    font-size: clamp(24px, 3.2vw, 52px);
    text-shadow: 0 4px 0 rgba(150, 30, 60, .4);
  }
  #emptyState .small {
    background: var(--yellow);
    color: #7A4A00;
    font-weight: 700;
    font-size: clamp(13px, 1.4vw, 22px);
    padding: .5em 1.6em;
    border-radius: 999px;
  }

  #gearBtn {
    position: fixed;
    top: 10px; left: 10px;
    background: rgba(255, 255, 255, .9);
    color: var(--blue-deep);
    border: none;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: "Poppins", sans-serif;
    font-weight: 700;
    font-size: 14px;
    opacity: 0;
    cursor: pointer;
    transition: opacity .3s;
    z-index: 10;
  }
  body.show-cursor #gearBtn { opacity: .9; }
  body:not(.show-cursor) { cursor: none; }
</style>
</head>
<body>

<button id="gearBtn" title="Ganti outlet">&#9881; Ganti outlet</button>

<section id="setup" class="screen active">
  <div class="logo-title"><span class="t1">PROMO</span> <span class="t2">HARI INI</span></div>
  <div class="setup-card">
    <label for="outletSelect">Pilih outlet untuk TV ini</label>
    <select id="outletSelect"></select>
    <button id="startBtn" disabled>Tampilkan Signage &#10024;</button>
  </div>
  <div id="setupStatus">Memuat daftar outlet&hellip;</div>
</section>

<section id="board" class="screen">
  <header>
    <div class="head-pill">&#128205; <span id="outletLine"></span></div>
    <div class="head-center">
      <div class="logo-title"><span class="t1">PROMO</span> <span class="t2">HARI INI</span></div>
    </div>
    <div class="head-pill right"><span id="dateLine"></span> - <span id="clockLine"></span> WITA</div>
  </header>

  <div class="panel">
    <div class="slides-area" id="slidesHost">
      <div id="emptyState">
        <div class="big">Belum ada promo untuk hari ini</div>
        <div class="small">Nantikan penawaran menarik berikutnya! &#128150;</div>
      </div>
    </div>
  </div>

  <footer id="dots"></footer>
</section>

<script>
(function () {
  'use strict';

  var API_URL = '/api/promos';
  var SLIDE_MS = 10000;
  var PROMOS_PER_SLIDE = 3;
  var REFRESH_HOURS = [8, 12, 18];      // jadwal tarik data, WITA
  var TZ = 'Asia/Makassar';             // WITA
  var STORAGE_KEY = 'phi_outlet_v1';
  var STAGE_W = 1920;
  var STAGE_H = 1080;

  var state = {
    raw: null,
    outlet: null,          // {kode, nama} atau {kode:'ALL', nama:'Semua Outlet'}
    slides: [],
    slideIndex: 0,
    slideTimer: null,
    lastSlotKey: null,
    fetchFailed: false
  };

  function fitStage() {
    var viewportW = window.innerWidth || document.documentElement.clientWidth || STAGE_W;
    var viewportH = window.innerHeight || document.documentElement.clientHeight || STAGE_H;
    var scale = Math.min(viewportW / STAGE_W, viewportH / STAGE_H);
    var left = Math.max(0, (viewportW - STAGE_W * scale) / 2);
    var top = Math.max(0, (viewportH - STAGE_H * scale) / 2);
    var transform = 'translate(' + left + 'px, ' + top + 'px) scale(' + scale + ')';
    document.querySelectorAll('.screen').forEach(function (el) {
      el.style.transform = transform;
    });
  }

  /* ---------- Util waktu (WITA) ---------- */
  function witaParts(date) {
    var fmt = new Intl.DateTimeFormat('id-ID', {
      timeZone: TZ,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
    var parts = {};
    fmt.formatToParts(date || new Date()).forEach(function (p) { parts[p.type] = p.value; });
    return parts;
  }

  function fmtDateLong(date) {
    return new Intl.DateTimeFormat('id-ID', {
      timeZone: TZ, weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    }).format(date || new Date());
  }

  function fmtDateShort(date) {
    return new Intl.DateTimeFormat('id-ID', {
      timeZone: TZ, day: 'numeric', month: 'short', year: 'numeric'
    }).format(date).toUpperCase();
  }

  // Tanggal akhir yang jatuh tepat pukul 00:00 WITA dianggap batas eksklusif
  // (mis. selesai 19 Juli 00:00 WITA berarti berlaku s/d 18 Juli).
  function fmtPeriod(startIso, endIso) {
    if (!startIso || !endIso) return '';
    var start = new Date(startIso);
    var end = new Date(endIso);
    var ep = witaParts(end);
    if (ep.hour === '00' && ep.minute === '00') {
      end = new Date(end.getTime() - 60000);
    }
    return fmtDateShort(start) + ' \u2013 ' + fmtDateShort(end);
  }

  /* ---------- Data ---------- */
  function fetchPromos() {
    return fetch(API_URL, { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        state.raw = data;
        state.fetchFailed = false;
        return data;
      })
      .catch(function () {
        state.fetchFailed = true;
        return null; // pertahankan data lama jika ada
      });
  }

  function allOutletsFromData() {
    var map = {};
    var promos = (state.raw && state.raw.promos) || [];
    promos.forEach(function (p) {
      (p.outlets || []).forEach(function (o) {
        if (o && o.kode) map[o.kode] = o.nama || o.kode;
      });
    });
    return Object.keys(map).sort().map(function (k) { return { kode: k, nama: map[k] }; });
  }

  function promoAppliesTo(promo, outletKode) {
    if (outletKode === 'ALL') return true;
    var outs = promo.outlets || [];
    if (outs.length === 0) return true; // tanpa daftar outlet = berlaku semua
    return outs.some(function (o) {
      if (!o) return false;
      var kode = String(o.kode || '').toUpperCase();
      var nama = String(o.nama || '').toLowerCase();
      return kode === String(outletKode).toUpperCase() ||
             kode === 'ALL' || nama.indexOf('semua') !== -1;
    });
  }

  /* ---------- Kartu promo ---------- */
  function extractPercent(mekanisme) {
    var m = /([0-9]+(?:[.,][0-9]+)?)\s*%/.exec(mekanisme || '');
    return m ? m[1].replace('.', ',') + '%' : null;
  }

  function scopeLabel(scope) {
    if (!scope) return '';
    if (String(scope).toLowerCase() === 'all_product') return 'SEMUA PRODUK';
    return 'SELECTED ITEM';
  }

  function promoLabel(jenis) {
    var j = String(jenis || '').toLowerCase();
    if (j === 'diskon') return 'DISCOUNT';
    return String(jenis || 'PROMO').toUpperCase();
  }

  function buildCard(promo) {
    var card = document.createElement('div');
    card.className = 'card';

    var brand = document.createElement('div');
    brand.className = 'brand-name';
    brand.textContent = promo.brand || '';

    var label = document.createElement('div');
    label.className = 'discount-label';
    label.textContent = promoLabel(promo.jenis_promo);

    var value = document.createElement('div');
    var pct = String(promo.jenis_promo || '').toLowerCase() === 'diskon'
      ? extractPercent(promo.mekanisme) : null;
    if (pct) {
      value.className = 'value percent';
      var number = document.createElement('span');
      number.className = 'percent-number';
      number.textContent = pct.replace('%', '');
      var dot = document.createElement('span');
      dot.className = 'percent-dot';
      dot.textContent = '%';
      value.appendChild(number);
      value.appendChild(dot);
    } else {
      value.className = 'value text';
      value.textContent = promo.mekanisme || promo.nama_promo || '';
    }

    var scope = document.createElement('div');
    scope.className = 'scope-pill';
    scope.textContent = scopeLabel(promo.product_scope);

    var period = document.createElement('div');
    period.className = 'period';
    period.textContent = '\u23F3 ' + fmtPeriod(promo.periode_mulai, promo.periode_selesai);

    card.appendChild(brand);
    card.appendChild(label);
    card.appendChild(value);
    card.appendChild(scope);
    card.appendChild(period);
    return card;
  }

  /* ---------- Slide ---------- */
  function rebuildSlides() {
    var host = document.getElementById('slidesHost');
    var empty = document.getElementById('emptyState');
    host.querySelectorAll('.slide').forEach(function (el) { el.remove(); });

    var promos = ((state.raw && state.raw.promos) || [])
      .filter(function (p) { return promoAppliesTo(p, state.outlet.kode); });

    state.slides = [];
    for (var i = 0; i < promos.length; i += PROMOS_PER_SLIDE) {
      state.slides.push(promos.slice(i, i + PROMOS_PER_SLIDE));
    }

    empty.style.display = state.slides.length ? 'none' : 'flex';

    state.slides.forEach(function (group) {
      var slide = document.createElement('div');
      slide.className = 'slide count-' + Math.min(group.length, 3);
      group.forEach(function (p) { slide.appendChild(buildCard(p)); });
      host.appendChild(slide);
    });

    var dots = document.getElementById('dots');
    dots.innerHTML = '';
    if (state.slides.length > 1) {
      state.slides.forEach(function () {
        var d = document.createElement('div');
        d.className = 'dot';
        dots.appendChild(d);
      });
    }

    state.slideIndex = 0;
    showSlide(0);
    restartRotation();
  }

  function showSlide(idx) {
    var slides = document.querySelectorAll('#slidesHost .slide');
    var dots = document.querySelectorAll('#dots .dot');
    slides.forEach(function (el, i) { el.classList.toggle('visible', i === idx); });
    dots.forEach(function (el, i) { el.classList.toggle('on', i === idx); });
  }

  function restartRotation() {
    if (state.slideTimer) clearInterval(state.slideTimer);
    if (state.slides.length <= 1) return;
    state.slideTimer = setInterval(function () {
      state.slideIndex = (state.slideIndex + 1) % state.slides.length;
      showSlide(state.slideIndex);
    }, SLIDE_MS);
  }

  /* ---------- Jadwal refresh (08.00 / 12.00 / 18.00 WITA + ganti hari) ---------- */
  function currentSlotKey() {
    var p = witaParts();
    var hour = parseInt(p.hour, 10);
    var slot = 'awal';
    REFRESH_HOURS.forEach(function (h) { if (hour >= h) slot = 'j' + h; });
    return p.year + '-' + p.month + '-' + p.day + '/' + slot;
  }

  function scheduleTick() {
    var key = currentSlotKey();
    if (key !== state.lastSlotKey || state.fetchFailed) {
      state.lastSlotKey = key;
      fetchPromos().then(function () { if (state.outlet) rebuildSlides(); });
    }
  }

  /* ---------- Header jam & tanggal ---------- */
  function tickClock() {
    var p = witaParts();
    document.getElementById('clockLine').textContent = p.hour + ':' + p.minute;
    document.getElementById('dateLine').textContent = fmtDateLong();
  }

  /* ---------- Layar setup ---------- */
  function populateOutletSelect() {
    var sel = document.getElementById('outletSelect');
    var status = document.getElementById('setupStatus');
    var btn = document.getElementById('startBtn');
    sel.innerHTML = '';

    var optAll = document.createElement('option');
    optAll.value = 'ALL';
    optAll.textContent = 'Semua Outlet';
    sel.appendChild(optAll);

    allOutletsFromData().forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o.kode;
      opt.textContent = o.nama + ' (' + o.kode + ')';
      sel.appendChild(opt);
    });

    if (state.fetchFailed) {
      status.textContent = 'Gagal memuat data. Periksa koneksi \u2014 mencoba ulang otomatis.';
      setTimeout(loadForSetup, 15000);
    } else {
      status.textContent = '';
    }
    btn.disabled = false;
  }

  function loadForSetup() {
    fetchPromos().then(populateOutletSelect);
  }

  function startBoard() {
    var sel = document.getElementById('outletSelect');
    var kode = sel.value;
    var nama = sel.options[sel.selectedIndex].textContent;
    state.outlet = { kode: kode, nama: kode === 'ALL' ? 'Semua Outlet' : nama };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.outlet)); } catch (e) {}
    enterBoard();
  }

  function enterBoard() {
    document.getElementById('setup').classList.remove('active');
    document.getElementById('board').classList.add('active');
    document.getElementById('outletLine').textContent = state.outlet.nama;
    state.lastSlotKey = currentSlotKey();
    rebuildSlides();
  }

  function backToSetup() {
    document.getElementById('board').classList.remove('active');
    document.getElementById('setup').classList.add('active');
    if (state.slideTimer) clearInterval(state.slideTimer);
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    state.outlet = null;
    loadForSetup();
  }

  /* ---------- Kursor & tombol ganti outlet ---------- */
  var cursorTimer = null;
  document.addEventListener('mousemove', function () {
    document.body.classList.add('show-cursor');
    if (cursorTimer) clearTimeout(cursorTimer);
    cursorTimer = setTimeout(function () {
      document.body.classList.remove('show-cursor');
    }, 4000);
  });

  document.getElementById('startBtn').addEventListener('click', startBoard);
  document.getElementById('gearBtn').addEventListener('click', backToSetup);
  window.addEventListener('resize', fitStage);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', fitStage);

  /* ---------- Boot ---------- */
  fitStage();
  tickClock();
  setInterval(tickClock, 1000);
  setInterval(scheduleTick, 30000);

  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}

  if (saved && saved.kode) {
    state.outlet = saved;
    fetchPromos().then(enterBoard);
  } else {
    loadForSetup();
  }
})();
</script>
</body>
</html>
